name: Coleta Dados Hidrometeorológicos RS

on:
  schedule:
    - cron: "*/10 * * * *"   # a cada 10 minutos
  workflow_dispatch:           # disparo manual via GitHub UI

env:
  PYTHON_VERSION: "3.11"
  TZ: America/Sao_Paulo

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 — Coleta ANA HidroWeb + INMET + Open-Meteo
  # ─────────────────────────────────────────────────────────
  collect:
    name: Coletar dados
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repositório de dados
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout código-fonte → code/
        uses: actions/checkout@v4
        with:
          repository: rafa-rebelo/climate-dashboard-rs
          token: ${{ secrets.GH_TOKEN }}
          path: code

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: code/requirements.txt

      - name: Instalar dependências
        run: pip install -r code/requirements.txt --quiet

      - name: Validar DuckDB (recriar se versão incompatível)
        env:
          DB_PATH: ${{ github.workspace }}/data/climate.duckdb
        run: |
          python -c "
          import duckdb, os, sys
          db = os.environ['DB_PATH']
          if not os.path.exists(db):
              print('DB nao existe ainda — sera criado pelos coletores.')
              sys.exit(0)
          try:
              con = duckdb.connect(db, read_only=True)
              con.close()
              print('DuckDB OK — formato compativel com duckdb ' + duckdb.__version__)
          except Exception as e:
              print('DuckDB incompativel: ' + str(e))
              print('Removendo banco antigo — sera recriado limpo pelos coletores.')
              os.remove(db)
          "

      - name: Coletar ANA HidroWeb (níveis + chuva)
        env:
          PYTHONPATH: ${{ github.workspace }}/code/src
          DB_PATH:    ${{ github.workspace }}/data/climate.duckdb
          ANA_IDENTIFICADOR: ${{ secrets.ANA_IDENTIFICADOR }}
          ANA_SENHA:         ${{ secrets.ANA_SENHA }}
        run: python -m collectors.ana_collector
        continue-on-error: true

      - name: Coletar INMET histórico RS (ZIP público — sem geo-restrição)
        env:
          PYTHONPATH: ${{ github.workspace }}/code
          DB_PATH:    ${{ github.workspace }}/data/climate.duckdb
        run: |
          cd ${{ github.workspace }}/code
          python -m src.collectors.inmet_collector --mode=historico --dias=30
        continue-on-error: true
        # ZIP: https://portal.inmet.gov.br/uploads/dadoshistoricos/{ano}.zip
        # Funciona globalmente (sem restrição de IP).
        # Dados horários via API (/estacao/dados/) retornam 204 fora do Brasil.

      - name: Coletar precipitação satélite GPM/CHIRPS
        env:
          PYTHONPATH: ${{ github.workspace }}/code
          DB_PATH:    ${{ github.workspace }}/data/climate.duckdb
          NASA_USER:  ${{ secrets.NASA_USER }}
          NASA_PASS:  ${{ secrets.NASA_PASS }}
        run: |
          cd ${{ github.workspace }}/code
          python -m src.collectors.gpm_collector
        continue-on-error: true
        # Fontes (auto-seleção por prioridade):
        #   1. GPM IMERG Early Run (NASA CMR + Earthdata auth) — se NASA_USER/NASA_PASS configurados
        #   2. CHIRPS v2.0 global daily (público, sem auth) — fallback sempre disponível
        # Saída: data/processed/gpm_precip_1d.parquet  (~17.700 pontos RS, 6 KB)

      - name: Coletar previsões Open-Meteo / NOAA
        env:
          PYTHONPATH: ${{ github.workspace }}/code/src
          DB_PATH:    ${{ github.workspace }}/data/climate.duckdb
          ANA_IDENTIFICADOR: ${{ secrets.ANA_IDENTIFICADOR }}
          ANA_SENHA:         ${{ secrets.ANA_SENHA }}
        run: python -m collectors.noaa_collector
        continue-on-error: true

      - name: Calcular acumulados de chuva
        env:
          PYTHONPATH: ${{ github.workspace }}/code/src
          DB_PATH:    ${{ github.workspace }}/data/climate.duckdb
        run: python -m processors.rain_accumulator
        continue-on-error: true

      - name: Gerar relatório de progresso
        env:
          PYTHONPATH: ${{ github.workspace }}/code/src
          DB_PATH:    ${{ github.workspace }}/data/climate.duckdb
        run: python -m utils.progress_tracker
        continue-on-error: true

      - name: Copiar artefatos atualizados → repositório de dados
        run: |
          # O climate.duckdb já é gravado diretamente em data/ (via DB_PATH)
          # — não precisa ser copiado, apenas incluído no git add abaixo.
          cp code/data/processed/accumulated_rain.parquet   data/processed/ 2>/dev/null || true
          cp code/data/processed/river_status.parquet       data/processed/ 2>/dev/null || true
          cp code/data/processed/progress.json              data/processed/ 2>/dev/null || true
          cp code/data/processed/inmet_stations_rs.parquet  data/processed/ 2>/dev/null || true
          cp code/data/processed/inmet_hourly.parquet       data/processed/ 2>/dev/null || true
          cp code/data/processed/inmet_historico_rs.parquet data/processed/ 2>/dev/null || true
          cp code/data/forecasts/nwp_7days.parquet          data/forecasts/ 2>/dev/null || true
          cp code/data/forecasts/nwp_7days_daily.parquet    data/forecasts/ 2>/dev/null || true
          cp code/data/processed/gpm_precip_1d.parquet      data/processed/ 2>/dev/null || true

      - name: Commit e push dos dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ JSONCRACK_FLUXOGRAMA.json 2>/dev/null || git add data/
          git diff --cached --quiet && echo "Sem alterações — skip commit" && exit 0
          TIMESTAMP=$(TZ=America/Sao_Paulo date "+%Y-%m-%d %H:%M BRT")
          git commit -m "data: atualização automática ${TIMESTAMP}"
          git push

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Verificação de alertas (depende do job collect)
  # ─────────────────────────────────────────────────────────
  alerts:
    name: Verificar alertas Telegram
    runs-on: ubuntu-latest
    needs: collect
    timeout-minutes: 3
    if: always()

    steps:
      - name: Checkout repositório de dados
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout código-fonte → code/
        uses: actions/checkout@v4
        with:
          repository: rafa-rebelo/climate-dashboard-rs
          token: ${{ secrets.GH_TOKEN }}
          path: code

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: code/requirements.txt

      - name: Instalar dependências
        run: pip install -r code/requirements.txt --quiet

      - name: Verificar alertas e notificar Telegram
        env:
          PYTHONPATH: ${{ github.workspace }}/code/src
          DB_PATH:    ${{ github.workspace }}/data/climate.duckdb
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          from alerts.telegram_bot import run_alert_cycle
          run_alert_cycle()
          "
        continue-on-error: true
